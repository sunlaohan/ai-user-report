[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 后端 API 代理 —— 通过 Serverless Function 转发
# Netlify 的 redirect 代理不会转发自定义 headers，所以必须用 function 代理
[[redirects]]
  from = "/mid-permission-server/*"
  to = "/.netlify/functions/api-proxy?proxyPath=/mid-permission-server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/fm-workorder-server/*"
  to = "/.netlify/functions/api-proxy?proxyPath=/fm-workorder-server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/dtp-rwd-server/*"
  to = "/.netlify/functions/api-proxy?proxyPath=/dtp-rwd-server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mid-frame-server/*"
  to = "/.netlify/functions/api-proxy?proxyPath=/mid-frame-server/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/dtp-file-server/*"
  to = "/.netlify/functions/api-proxy?proxyPath=/dtp-file-server/:splat"
  status = 200
  force = true

# 将 /api 请求转交到 Netlify Functions
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# Vue Router History 模式 fallback（必须放最后）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
